<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML测试报告</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.8;
            color: #333;
            background: #fafafa;
        }
        h1 { color: #1a1a1a; border-bottom: 2px solid #4a9eff; padding-bottom: 10px; }
        h2 { color: #2c3e50; margin-top: 1.5em; }
        h3 { color: #34495e; }
        blockquote {
            border-left: 4px solid #4a9eff;
            margin: 1em 0;
            padding: 0.5em 1em;
            background: #f0f7ff;
            color: #555;
        }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 16px; border-radius: 6px; overflow-x: auto; }
        pre code { background: none; padding: 0; color: inherit; }
        table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        th { background: #f5f5f5; }
        hr { border: none; border-top: 1px solid #eee; margin: 2em 0; }
        .meta { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>HTML测试报告</h1>
    <p class="meta">生成时间: 2026-05-21 23:23:49</p>
    <hr>
    <p>这是一份HTML格式的报告。</p>
</body>
</html>
